<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threaded Studio — Fiber Arts</title>

<style>
    body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #111;
        color: #eee;
    }

    header {
        padding: 20px;
        text-align: center;
        background: #1a1a1a;
        border-bottom: 1px solid #333;
        font-size: 1.4rem;
        letter-spacing: 1px;
        font-weight: 600;
    }

    .section {
        padding: 20px;
        max-width: 700px;
        margin: auto;
    }

    h2 {
        margin-top: 0;
        font-size: 1.3rem;
        border-bottom: 1px solid #333;
        padding-bottom: 8px;
        color: #cfcfcf;
    }

    .card {
        background: #1a1a1a;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 15px;
        border: 1px solid #2a2a2a;
    }

    .nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #1a1a1a;
        border-top: 1px solid #333;
        display: flex;
        justify-content: space-around;
        padding: 10px 0;
    }

    .nav a {
        color: #aaa;
        text-decoration: none;
        font-size: 0.9rem;
        text-align: center;
        flex: 1;
    }

    .nav a:hover {
        color: white;
    }

    .placeholder {
        opacity: 0.6;
        font-style: italic;
    }
</style>
</head>

<body>

<header>Threaded Studio</header>

<div class="section">
    <h2>Dashboard</h2>
    <div class="card">
        <p class="placeholder">Your fiber‑arts hub. Track projects, yarn, and creative sessions.</p>
    </div>

    <h2>Projects</h2>
    <div class="card">
        <p class="placeholder">Project list coming soon.</p>
    </div>

    <h2>Yarn Stash</h2>
    <div class="card">
        <p class="placeholder">Yarn inventory coming soon.</p>
    </div>

    <h2>Journal</h2>
    <div class="card">
        <p class="placeholder">Creative journal entries will appear here.</p>
    </div>
</div>

<div class="nav">
    <a href="#dashboard">Dashboard</a>
    <a href="#projects">Projects</a>
    <a href="#yarn">Yarn</a>
    <a href="#journal">Journal</a>
</div>

</body>
</html>
